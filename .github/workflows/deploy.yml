name: Deploy infra

on:
  push:
    branches: [master]

concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ secrets.INFRA_DIR }}
            cd ${{ secrets.INFRA_DIR }}
            if [ -d .git ]; then
              git pull origin master
            else
              git clone https://github.com/nerdifica/nerdifica-infra.git .
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f