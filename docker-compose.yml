services:
  api:
    image: ghcr.io/nerdifica/nerdifica-api:latest
    restart: unless-stopped
    environment:
      SITE_NAME: ${SITE_NAME:-Nerdifica}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://nerdifica.com"]}
    expose:
      - "8000"

  site:
    image: ghcr.io/nerdifica/nerdifica-site:latest
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - site
      - api