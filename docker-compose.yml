services:
  api:
    image: ghcr.io/nerdifica/nerdifica-api:latest
    restart: unless-stopped
    environment:
      SITE_NAME: ${SITE_NAME:-Nerdifica}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://nerdifica.com"]}
    expose:
      - "8000"

  site:
    image: ghcr.io/nerdifica/nerdifica-site:latest
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - site
      - api
    # Reloads periodically so renewed certificates (written by the certbot
    # service below) get picked up without a manual restart. The first reload
    # races nginx's own startup and harmlessly no-ops; every reload after that
    # succeeds.
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        nginx -s reload;
        sleep 6h & wait $${!};
      done &
      exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done"